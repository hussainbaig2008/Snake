<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Snake</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        :root {
            --bg-color: #0d1117;
            --grid-color: #161b22;
            --snake-color: #00ff9d;
            --food-color: #ff0055;
            --text-color: #e6edf3;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #game-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1;
            max-height: 90vh;
            background-color: var(--bg-color);
            box-shadow: 0 0 50px rgba(0, 255, 157, 0.1);
            border: 2px solid #30363d;
            border-radius: 12px;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(4px);
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            color: var(--snake-color);
            text-shadow: 0 0 20px rgba(0, 255, 157, 0.5);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        p {
            color: var(--text-color);
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.8;
        }

        .btn {
            background: transparent;
            color: var(--snake-color);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            padding: 12px 36px;
            border: 2px solid var(--snake-color);
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.2);
        }

        .btn:hover {
            background: var(--snake-color);
            color: var(--bg-color);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.6);
        }

        #score-hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 5;
        }

        #score-hud span {
            color: var(--snake-color);
            font-weight: bold;
        }

        .stats-box {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #8b949e;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 2.5rem;
            color: #fff;
        }

        /* Mobile Controls Hint */
        .mobile-hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.2);
            font-size: 0.9rem;
            pointer-events: none;
            display: none;
        }
        
        @media (hover: none) {
            .mobile-hint { display: block; }
        }

    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="score-hud">SCORE: <span id="hud-score">0</span></div>
    
    <canvas id="gameCanvas"></canvas>

    <div id="start-screen" class="ui-overlay">
        <h1>NEON<br>SNAKE</h1>
        <p>Use Arrow Keys or Swipe to Move</p>
        <button class="btn" id="start-btn">Start Game</button>
    </div>

    <div id="game-over-screen" class="ui-overlay hidden">
        <h1 style="color: var(--food-color); text-shadow: 0 0 20px rgba(255, 0, 85, 0.5);">GAME OVER</h1>
        
        <div class="stats-box">
            <div class="stat">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="final-score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Best</div>
                <div class="stat-value" id="best-score">0</div>
            </div>
        </div>

        <button class="btn" id="restart-btn">Try Again</button>
    </div>

    <div class="mobile-hint">SWIPE TO CHANGE DIRECTION</div>
</div>

<script>
    /**
     * NEON SNAKE
     * A modern take on the classic
     */

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const hudScore = document.getElementById('hud-score');
    const finalScoreEl = document.getElementById('final-score');
    const bestScoreEl = document.getElementById('best-score');
    const startBtn = document.getElementById('start-btn');
    const restartBtn = document.getElementById('restart-btn');

    // Configuration
    const GRID_SIZE = 20; // Size of one grid cell in pixels (internal logic)
    let TILE_COUNT = 20; // Number of tiles per row/col
    
    // Game State
    let gameLoop;
    let score = 0;
    let highScore = localStorage.getItem('neon_snake_highscore') || 0;
    let speed = 100; // ms per frame
    let lastRenderTime = 0;
    
    let snake = [];
    let food = { x: 0, y: 0 };
    let velocity = { x: 0, y: 0 };
    let inputVelocity = { x: 0, y: 0 }; // Buffer for next move
    let isGameRunning = false;

    // --- Audio System (Synth) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function playSound(type) {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        const now = audioCtx.currentTime;

        if (type === 'eat') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(600, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        } else if (type === 'die') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.linearRampToValueAtTime(50, now + 0.3);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        } else if (type === 'turn') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, now);
            gain.gain.setValueAtTime(0.05, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
            osc.start(now);
            osc.stop(now + 0.05);
        }
    }

    // --- Initialization ---

    function init() {
        resize();
        window.addEventListener('resize', resize);
        
        // Input
        document.addEventListener('keydown', handleKeyInput);
        setupTouchControls();

        // Buttons
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // Initial Draw
        drawGrid();
    }

    function resize() {
        // Make canvas resolution match CSS size for crisp rendering
        const wrapper = document.getElementById('game-wrapper');
        const size = Math.floor(wrapper.clientWidth);
        canvas.width = size;
        canvas.height = size;
        
        // Calculate tile size based on canvas width
        // We want roughly 20-25 tiles across
        TILE_COUNT = 20; 
    }

    function startGame() {
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        
        isGameRunning = true;
        score = 0;
        updateScore(0);
        
        // Reset Snake (Start in middle)
        const mid = Math.floor(TILE_COUNT / 2);
        snake = [
            { x: mid, y: mid },
            { x: mid, y: mid + 1 },
            { x: mid, y: mid + 2 }
        ];
        
        velocity = { x: 0, y: -1 }; // Move up initially
        inputVelocity = { x: 0, y: -1 };
        
        placeFood();
        
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        
        lastRenderTime = performance.now();
        requestAnimationFrame(mainLoop);
    }

    function mainLoop(currentTime) {
        if (!isGameRunning) return;

        window.requestAnimationFrame(mainLoop);

        const secondsSinceLastRender = (currentTime - lastRenderTime) / 1000;
        
        // Calculate speed based on score (gets faster)
        const currentSpeed = Math.max(0.06, 0.1 - (score * 0.002));
        
        if (secondsSinceLastRender < currentSpeed) return;

        lastRenderTime = currentTime;

        update();
        draw();
    }

    function update() {
        // Apply buffered input
        velocity = { ...inputVelocity };

        // Calculate new head position
        const head = { x: snake[0].x + velocity.x, y: snake[0].y + velocity.y };

        // Wall Collision
        if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
            gameOver();
            return;
        }

        // Self Collision
        for (let i = 0; i < snake.length; i++) {
            if (head.x === snake[i].x && head.y === snake[i].y) {
                gameOver();
                return;
            }
        }

        // Move Snake
        snake.unshift(head); // Add new head

        // Check Food
        if (head.x === food.x && head.y === food.y) {
            score += 10;
            updateScore(score);
            playSound('eat');
            placeFood();
            // Don't pop tail, so snake grows
        } else {
            snake.pop(); // Remove tail
        }
    }

    function draw() {
        const tileSize = canvas.width / TILE_COUNT;

        // Clear
        ctx.fillStyle = '#0d1117';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw Grid (Optional, subtle)
        ctx.strokeStyle = '#161b22';
        ctx.lineWidth = 1;
        for (let i = 0; i <= TILE_COUNT; i++) {
            ctx.beginPath();
            ctx.moveTo(i * tileSize, 0);
            ctx.lineTo(i * tileSize, canvas.height);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i * tileSize);
            ctx.lineTo(canvas.width, i * tileSize);
            ctx.stroke();
        }

        // Draw Food (Pulsing Effect)
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#ff0055';
        ctx.fillStyle = '#ff0055';
        
        // Simple pulse animation based on time
        const pulse = Math.sin(Date.now() / 200) * 2;
        const foodSize = tileSize - 4 + pulse;
        const foodOffset = (tileSize - foodSize) / 2;
        
        ctx.beginPath();
        ctx.arc(
            (food.x * tileSize) + (tileSize/2), 
            (food.y * tileSize) + (tileSize/2), 
            foodSize / 2, 
            0, Math.PI * 2
        );
        ctx.fill();

        // Draw Snake
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#00ff9d';
        
        snake.forEach((segment, index) => {
            // Head is slightly different color or brightness
            ctx.fillStyle = index === 0 ? '#ccffeb' : '#00ff9d';
            
            // Draw rounded rects for segments
            const segX = segment.x * tileSize + 1;
            const segY = segment.y * tileSize + 1;
            const segSize = tileSize - 2;
            
            ctx.fillRect(segX, segY, segSize, segSize);
        });

        // Reset shadow for next frame
        ctx.shadowBlur = 0;
    }

    function placeFood() {
        // Random position ensuring not on snake
        let valid = false;
        while (!valid) {
            food = {
                x: Math.floor(Math.random() * TILE_COUNT),
                y: Math.floor(Math.random() * TILE_COUNT)
            };
            
            valid = true;
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    valid = false;
                    break;
                }
            }
        }
    }

    function gameOver() {
        isGameRunning = false;
        playSound('die');
        
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('neon_snake_highscore', highScore);
        }
        
        finalScoreEl.innerText = score;
        bestScoreEl.innerText = highScore;
        
        gameOverScreen.classList.remove('hidden');
    }

    function updateScore(val) {
        hudScore.innerText = val;
    }

    // --- Inputs ---

    function handleKeyInput(e) {
        if (!isGameRunning) return;
        
        // Prevent reversing direction directly
        switch(e.key) {
            case 'ArrowUp':
            case 'w':
            case 'W':
                if (velocity.y === 0) {
                    inputVelocity = { x: 0, y: -1 };
                    playSound('turn');
                }
                break;
            case 'ArrowDown':
            case 's':
            case 'S':
                if (velocity.y === 0) {
                    inputVelocity = { x: 0, y: 1 };
                    playSound('turn');
                }
                break;
            case 'ArrowLeft':
            case 'a':
            case 'A':
                if (velocity.x === 0) {
                    inputVelocity = { x: -1, y: 0 };
                    playSound('turn');
                }
                break;
            case 'ArrowRight':
            case 'd':
            case 'D':
                if (velocity.x === 0) {
                    inputVelocity = { x: 1, y: 0 };
                    playSound('turn');
                }
                break;
        }
    }

    // Touch Swipe Logic
    function setupTouchControls() {
        let touchStartX = 0;
        let touchStartY = 0;
        
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault(); // Prevent scrolling
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, {passive: false});

        canvas.addEventListener('touchend', function(e) {
            e.preventDefault();
            if (!isGameRunning) return;

            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            
            handleSwipe(touchStartX, touchStartY, touchEndX, touchEndY);
        }, {passive: false});
    }

    function handleSwipe(sx, sy, ex, ey) {
        const dx = ex - sx;
        const dy = ey - sy;
        
        if (Math.abs(dx) > Math.abs(dy)) {
            // Horizontal
            if (Math.abs(dx) < 30) return; // Ignore small swipes
            if (dx > 0 && velocity.x === 0) inputVelocity = { x: 1, y: 0 };
            else if (dx < 0 && velocity.x === 0) inputVelocity = { x: -1, y: 0 };
        } else {
            // Vertical
            if (Math.abs(dy) < 30) return;
            if (dy > 0 && velocity.y === 0) inputVelocity = { x: 0, y: 1 };
            else if (dy < 0 && velocity.y === 0) inputVelocity = { x: 0, y: -1 };
        }
    }

    // Init
    init();

</script>
</body>
</html>
